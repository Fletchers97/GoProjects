syntax = "proto3";

package pb;

option go_package = "./pb";

message AnalyticRequest {
  string symbol = 1;
  int32 period = 2;
}

message AnalyticResponse {
  string symbol = 1;
  double current_price = 2;
  double rsi_value = 3;
  string status = 4;
}

service AnalyticsService {
  rpc GetRSI (AnalyticRequest) returns (AnalyticResponse);
}